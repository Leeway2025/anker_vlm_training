# Phase 5d: 隐式 CoT 蒸馏(training_plan.md 第 8 节)
phase: "5d_cot"
init_from: "outputs/phase5b_aux/final"
epochs: 2   # 上限预算;早停可能提前结束,不够可 --epochs 追加
learning_rate_scale: 0.5
use_whitelist_only: false      # 样本全量;资产文件已按白名单过滤
enable_ks_parent_head: false
enable_aux_heads: false
cot_mode: true
cot_reason_ratio: 0.6          # 60% 推理链模式 / 40% 生产模式
cot_anneal_epochs: 0.5         # 最后 0.5 epoch 纯生产模式退火
# 验收: eval/format_validator.py 统计 think 泄漏率,必须 = 0%
