# Phase 7: 1M 自然分布续训轮(两阶段数据策略的第二轮)
# 定位修正(2026-07-09,用户依据客户历史数据指正): 1M 相对 100k 的
#   本质增量是 ~90 万条全新视频(新家庭/机位/光照/长尾实例)= 真实的
#   表征能力增量,客户历史 100k→1M 提升显著 —— 因此是**真续训**,
#   不是轻量先验校准。
# 结构: v2 热启(保 100k 轮成果)→ SFT ≤2 epoch 早停 → 1M Hard Mining
#   → 半轮 KTO + SWA;5b'/5d' 视 1M 资产就绪与否加跑(+2~3 天):
#   标注与训练零资源冲突(API vs TPU),D1 对 wds_full 全量启动
#   label_euno_wds(不传 --annotation 即全量,无需等 GT),3~4 天@50 并发,
#   一次标注服务两轮(100k 资产 = 其子集)。
# 保底降级(排期告急时): epochs 1 + learning_rate_scale 0.3,跳 HM/KTO。
# 前置: ① 1M 全量 GT 标注(关键路径,D7 前到位)② val_size 30000
#       ③ 监控集用 1M 重建(自然分布下安全类配额才生效)
# 监控红线: 安全类 q/r/u/n/j recall ≥ v2 基线 -1pt;热区对混淆不回退;
#   破线处置: LR 减半重试 → 仍不达则保留 v2
phase: "7_1m_calib"
init_from: "outputs/swa_final"    # v2(含 projector);无 SWA 则 phase6_kto/final
epochs: 2                          # 上限;早停决定实际长度。
# 预期口径(客户实测): 1M 收益被容量截断 —— r64 基线提升明显,
# 全参 EunoVLM 提升更大;我方 378M 可训容量(r512/256+vision+proj)
# 预期靠近全参侧。若 2ep 用尽且验证曲线仍在降(容量未吃饱 1M),
# 用 --init-from <本阶段final> --epochs 追加,勿机械停
learning_rate_scale: 0.5           # 真学习与保成果的折中
use_whitelist_only: false
enable_ks_parent_head: false       # 资产阶段不重跑,纯生产格式 SFT
enable_aux_heads: false
cot_mode: false
# 后续: run_inference(1M, --shard 切片)→ hard_mining(不传 whitelist,
# 客户 GT 人工修正过)→ 续训 → build_kto_data → kto(1 epoch)→ swa
